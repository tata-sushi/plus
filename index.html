<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="content-language" content="pt-BR" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#F5F4F1" />
    <script>
      // aplica o tema antes da 1ª pintura (evita flash). Sempre seta o
      // data-theme (default 'light') pra habilitar o variante dark: do Tailwind.
      try {
        var t = localStorage.getItem('tp_theme') === 'dark' ? 'dark' : 'light'
        document.documentElement.setAttribute('data-theme', t)
        var m = document.querySelector('meta[name="theme-color"]')
        if (m) m.setAttribute('content', t === 'light' ? '#F5F4F1' : '#0A0A0A')
      } catch (e) {}
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tatá Plus" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Tatá Plus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
